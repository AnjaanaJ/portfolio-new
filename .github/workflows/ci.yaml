name: Portfolio CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: portfolio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Basic Portfolio Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Required Files Exist
        run: |
          echo "Checking core files..."

          test -f index.html || (echo "Missing index.html" && exit 1)
          test -f style.css || (echo "Missing style.css" && exit 1)
          test -f script.js || (echo "Missing script.js" && exit 1)

          echo "All required files exist"

      - name: Basic HTML sanity check
        run: |
          grep -q "<html" index.html || (echo "index.html missing <html>" && exit 1)
          grep -q "</html>" index.html || (echo "index.html missing closing tag" && exit 1)

          echo "HTML structure looks OK"

      - name: CI Passed
        run: echo "Portfolio CI passed successfully"